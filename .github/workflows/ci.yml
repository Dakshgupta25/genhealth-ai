name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: genhealth_test
          POSTGRES_USER: genhealth
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://genhealth:password@localhost:5432/genhealth_test
      SYNC_DATABASE_URL: postgresql://genhealth:password@localhost:5432/genhealth_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      ALGORITHM: HS256
      ENVIRONMENT: test
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB_NAME: genhealth_test
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_BUCKET_NAME: test-bucket

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite  # For in-memory SQLite testing

      - name: Run linting (flake8)
        working-directory: backend
        run: flake8 app/ tests/ --max-line-length=100 --exclude=__pycache__

      - name: Run type checking (mypy)
        working-directory: backend
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # Non-blocking for now

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            -v \
            --asyncio-mode=auto \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage

  # ─── Frontend Lint ─────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint HTML files
        run: |
          npx -y htmlhint frontend/**/*.html || echo "HTMLHint complete"

  # ─── Docker Build Check ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t genhealth-api:ci ./backend

      - name: Test Docker image starts
        run: |
          docker run --rm --entrypoint python genhealth-api:ci \
            -c "from app.config import get_settings; print('Config OK:', get_settings().PROJECT_NAME)"
        env:
          SECRET_KEY: ci-test-key
          DATABASE_URL: postgresql+asyncpg://u:p@localhost/db
