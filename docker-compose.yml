version: '3.9'

services:
  # ─── FastAPI Application ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genhealth_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://genhealth:password@postgres:5432/genhealth
      - SYNC_DATABASE_URL=postgresql://genhealth:password@postgres:5432/genhealth
      - MONGODB_URL=mongodb://mongodb:27017/genhealth
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - genhealth_net

  # ─── Celery Worker ────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genhealth_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://genhealth:password@postgres:5432/genhealth
      - MONGODB_URL=mongodb://mongodb:27017/genhealth
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - genhealth_net

  # ─── Celery Beat (scheduled tasks) ───────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genhealth_beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - genhealth_net

  # ─── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: genhealth_postgres
    environment:
      POSTGRES_DB: genhealth
      POSTGRES_USER: genhealth
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genhealth"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - genhealth_net

  # ─── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: genhealth_mongo
    environment:
      MONGO_INITDB_DATABASE: genhealth
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped
    networks:
      - genhealth_net

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: genhealth_redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - genhealth_net

  # ─── MinIO (S3-compatible local storage) ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: genhealth_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - genhealth_net

# ─── Volumes ─────────────────────────────────────────────────────
volumes:
  pgdata:
  mongodata:
  redisdata:
  miniodata:

# ─── Networks ────────────────────────────────────────────────────
networks:
  genhealth_net:
    driver: bridge
